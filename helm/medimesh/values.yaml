# ═══════════════════════════════════════════════════════════
# MediMesh — Global Values (Single Source of Truth)
# ═══════════════════════════════════════════════════════════

global:
  imageRegistry: bharath44623
  imageTag: "v1.1.0"
  imagePullPolicy: Always
  environment: production

  # Namespace isolation
  namespaces:
    frontend: medimesh-frontend
    backend: medimesh-backend
    db: medimesh-db

  # NFS storage config
  storage:
    nfs:
      server: "172.31.90.107"
      path: "/srv/nfs/medimesh"
      storageClass: nfs-dynamic-medimesh

  # MongoDB connection (used by all backend services)
  mongo:
    host: "medimesh-mongodb"
    port: 27017
    replicaSet: rs0
    replicas: 3

  # Shared secrets (base64 encoded)
  secrets:
    jwtSecret: "bWVkaW1lc2gtand0LXNlY3JldC0yMDI0"
    adminUsername: "YWRtaW4="
    adminPassword: "cGFzc3dvcmQxMjM="
    mongoRootUsername: "bWVkaW1lc2hBZG1pbg=="
    mongoRootPassword: "bWVkaW1lc2hQYXNzMjAyNA=="

# ─── Frontend ─────────────────────────────────────────────
frontend:
  name: medimesh-frontend
  replicas: 2
  image:
    repository: bharath44623/medimesh_medimesh-frontend
    tag: "v2.1.0"
  containerPort: 80
  service:
    name: medimesh-frontend-svc
    type: ClusterIP
    port: 80
    targetPort: 80
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  sidecar:
    image: busybox:1.36
    resources:
      requests:
        cpu: "25m"
        memory: "32Mi"
      limits:
        cpu: "50m"
        memory: "64Mi"
  readinessProbe:
    path: /
    port: 80
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
  livenessProbe:
    path: /
    port: 80
    initialDelaySeconds: 10
    periodSeconds: 20
    timeoutSeconds: 3
  strategy:
    type: RollingUpdate
    maxUnavailable: 1
    maxSurge: 1
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilization: 60
  gateway:
    enabled: true
    name: medimesh-gateway
    className: kgateway
    listeners:
      - name: http
        protocol: HTTP
        port: 80
    httpRoute:
      name: medimesh-routes

# ─── BFF ──────────────────────────────────────────────────
bff:
  name: medimesh-bff
  replicas: 2
  image:
    repository: bharath44623/medimesh_medimesh-bff
    tag: "v1.1.0"
  containerPort: 5010
  service:
    name: medimesh-bff-svc
    type: ClusterIP
    port: 5010
    targetPort: 5010
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  readinessProbe:
    path: /health
    port: 5010
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
  livenessProbe:
    path: /health
    port: 5010
    initialDelaySeconds: 15
    periodSeconds: 20
    timeoutSeconds: 5
  strategy:
    type: RollingUpdate
    maxUnavailable: 1
    maxSurge: 1

